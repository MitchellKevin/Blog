<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mitchell Scholte — Meesterschap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* Figma design tokens (dark) */
  --canvas:        #1e1e1e;
  --chrome:        #2c2c2c;
  --chrome-2:      #383838;
  --input:         #2c2c2c;
  --input-hover:   #383838;
  --border:        #383838;
  --divider:       rgba(255,255,255,0.07);
  --text:          #ffffff;
  --text-2:        #b3b3b3;
  --text-3:        #7a7a7a;
  --icon:          #cdcdcd;
  --blue:          #0d99ff;
  --blue-hover:    #0a85e0;
  --blue-soft:     rgba(13,153,255,0.18);
  --selected-row:  rgba(13,153,255,0.16);
  --hover:         rgba(255,255,255,0.06);
  --mono: 'Space Mono', monospace;
  --sans: 'Inter', -apple-system, system-ui, sans-serif;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  background:var(--canvas); color:var(--text);
  font-family:var(--sans); font-size:11px; user-select:none;
  -webkit-font-smoothing:antialiased;
}
svg { display:block; }

/* ───────────── Top toolbar ───────────── */
.toolbar {
  position:fixed; top:0; left:0; right:0; height:40px;
  background:var(--chrome); border-bottom:1px solid var(--border);
  display:flex; align-items:center; z-index:100; padding:0 4px;
}
.tb-group { display:flex; align-items:center; gap:0; }
.tb-left  { flex:1; justify-content:flex-start; }
.tb-center{ position:absolute; left:50%; transform:translateX(-50%); }
.tb-right { flex:1; justify-content:flex-end; gap:2px; padding-right:6px; }

.tb-btn {
  height:32px; min-width:32px; padding:0 4px; border:none; background:none;
  color:var(--icon); cursor:pointer; border-radius:5px;
  display:flex; align-items:center; justify-content:center; gap:2px;
  transition:background .1s, color .1s;
}
.tb-btn:hover { background:var(--hover); color:#fff; }
.tb-btn.active { background:var(--blue); color:#fff; }
.tb-btn.active:hover { background:var(--blue); }
.tb-caret { opacity:.5; }
.tb-sep { width:1px; height:18px; background:var(--border); margin:0 6px; }

.tb-logo {
  width:32px; height:32px; border-radius:5px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:var(--icon);
}
.tb-logo:hover { background:var(--hover); }

.tb-file { display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:5px; cursor:pointer; }
.tb-file:hover { background:var(--hover); }
.tb-file-name { font-weight:600; color:var(--text); font-size:12px; }
.tb-file-crumb { color:var(--text-3); font-size:12px; }

.avatars { display:flex; align-items:center; margin-right:4px; }
.avatar {
  width:24px; height:24px; border-radius:50%; border:2px solid var(--chrome);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600; color:#fff; margin-left:-6px;
}
.avatar:first-child { margin-left:0; }
.btn-present {
  width:28px; height:28px; border-radius:5px; border:none; background:none;
  color:var(--icon); cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.btn-present:hover { background:var(--blue); color:#fff; }
.btn-share {
  background:var(--blue); color:#fff; border:none; height:28px; padding:0 14px;
  border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--sans);
}
.btn-share:hover { background:var(--blue-hover); }

/* ───────────── App grid ───────────── */
.app {
  position:fixed; top:40px; bottom:0; left:0; right:0;
  display:grid; grid-template-columns:240px 1fr 240px;
}

/* ───────────── Left panel ───────────── */
.panel-left { background:var(--chrome); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel-tabs { display:flex; height:40px; border-bottom:1px solid var(--divider); padding:0 8px; gap:2px; align-items:center; }
.panel-tab { padding:6px 8px; font-size:11px; font-weight:600; color:var(--text-3); cursor:pointer; border-radius:5px; }
.panel-tab:hover { color:var(--text-2); }
.panel-tab.active { color:var(--text); }
.panel-tab.active::after { content:''; display:block; height:2px; background:var(--text); border-radius:2px; margin-top:5px; margin-bottom:-6px; }

.section { border-bottom:1px solid var(--divider); }
.section-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px 8px 12px; font-size:11px; font-weight:600; color:var(--text-2); cursor:default;
}
.section-head .chev { color:var(--text-3); }

.pages { padding:0 8px 8px; }
.page-row {
  display:flex; align-items:center; gap:8px; height:28px; padding:0 8px;
  border-radius:5px; cursor:pointer; font-size:11px; color:var(--text-2);
}
.page-row:hover { background:var(--hover); }
.page-row.active { background:var(--selected-row); color:var(--text); }
.page-check { width:12px; color:var(--blue); opacity:0; flex-shrink:0; }
.page-row.active .page-check { opacity:1; }

.layers { padding:0 8px 8px; flex:1; overflow-y:auto; scrollbar-width:thin; }
.layers::-webkit-scrollbar { width:8px; }
.layers::-webkit-scrollbar-thumb { background:#4a4a4a; border-radius:4px; border:2px solid var(--chrome); }
.layer-row {
  display:flex; align-items:center; gap:6px; height:26px; padding:0 8px;
  border-radius:5px; cursor:pointer; font-size:11px; color:var(--text-2);
}
.layer-row:hover { background:var(--hover); }
.layer-row.selected { background:var(--selected-row); color:var(--blue); }
.layer-row .l-icon { color:var(--text-3); flex-shrink:0; }
.layer-row.selected .l-icon { color:var(--blue); }
.layer-row .l-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.layer-row .l-eye { opacity:0; color:var(--text-3); flex-shrink:0; }
.layer-row:hover .l-eye { opacity:1; }

/* ───────────── Canvas ───────────── */
.canvas-wrap { position:relative; overflow:hidden; background:var(--canvas); cursor:default; }
.canvas-wrap.panning { cursor:grabbing; }
#dot-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, #2b2b2b 1.2px, transparent 1.2px);
  background-size:24px 24px;
}
#canvas { position:absolute; top:0; left:0; transform-origin:0 0; }
.frame { position:absolute; cursor:pointer; }
.frame-label {
  position:absolute; top:-20px; left:1px; font-size:11px; font-weight:450;
  color:var(--text-3); white-space:nowrap; pointer-events:none; letter-spacing:.01em;
}
.frame:hover .frame-label, .frame.selected .frame-label { color:var(--blue); }
.frame-inner { width:100%; height:100%; overflow:hidden; position:relative; outline:1px solid transparent; transition:outline-color .1s; }
.frame:hover .frame-inner { outline-color:rgba(13,153,255,0.5); }
.frame.selected .frame-inner { outline:2px solid var(--blue); }

/* blog artwork inside frames (keeps its own mono aesthetic) */
.fc-cover { height:100%; display:flex; flex-direction:column; justify-content:flex-end; padding:28px; position:relative; overflow:hidden; }
.fc-cover-glow { position:absolute; inset:0; pointer-events:none; }
.fc-cover-tag { font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:8px; position:relative; }
.fc-cover-title { font-family:var(--mono); font-weight:700; line-height:1.15; position:relative; }
.fc-cover-sub { font-family:var(--sans); font-size:13px; line-height:1.6; margin-top:10px; position:relative; opacity:0.65; }
.fc-cover-meta { font-family:var(--mono); font-size:10px; margin-top:16px; opacity:0.35; position:relative; }
.fc-post { height:100%; padding:24px; display:flex; flex-direction:column; gap:12px; }
.fc-post-tag { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; }
.fc-post-title { font-family:var(--mono); font-size:17px; font-weight:700; line-height:1.3; color:#f0f0f0; }
.fc-post-body { font-family:var(--sans); font-size:12px; line-height:1.7; color:#888; flex:1; overflow:hidden; }
.fc-post-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid #2a2a2a; margin-top:auto; }
.fc-post-date { font-family:var(--mono); font-size:9px; color:#555; }
.fc-post-tags { display:flex; gap:4px; flex-wrap:wrap; }
.fc-pill { font-family:var(--mono); font-size:9px; padding:2px 6px; border-radius:3px; border:1px solid; }
.fc-wip { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
.fc-wip-icon { font-size:24px; opacity:0.15; }
.fc-wip-text { font-family:var(--mono); font-size:9px; color:#4a4a4a; letter-spacing:0.12em; text-transform:uppercase; }
/* leerdoelen frame */
.fc-goals { height:100%; padding:24px; display:flex; flex-direction:column; gap:8px; overflow:hidden; }
.fc-goals-title { font-family:var(--mono); font-size:18px; font-weight:700; color:#f0f0f0; line-height:1.2; margin-bottom:6px; }
.goal-list { display:flex; flex-direction:column; gap:11px; }
.goal { padding:2px 0 2px 12px; border-left:2px solid; }
.goal-top { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:4px; }
.goal-name { font-family:var(--mono); font-size:12px; font-weight:700; color:#e8e8e8; }
.goal-status { font-family:var(--mono); font-size:8px; padding:2px 6px; border-radius:3px; letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap; }
.goal-text { font-family:var(--sans); font-size:11px; line-height:1.5; color:#888; }
.section-label { position:absolute; font-family:var(--mono); font-size:11px; color:#383838; letter-spacing:0.1em; text-transform:uppercase; pointer-events:none; white-space:nowrap; }

/* ───────────── Right panel (Design inspector) ───────────── */
.panel-right { background:var(--chrome); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; scrollbar-width:thin; }
.panel-right::-webkit-scrollbar { width:8px; }
.panel-right::-webkit-scrollbar-thumb { background:#4a4a4a; border-radius:4px; border:2px solid var(--chrome); }
.insp-tabs { display:flex; height:40px; align-items:center; padding:0 8px; gap:2px; border-bottom:1px solid var(--divider); flex-shrink:0; }
.insp-tab { padding:6px 8px; font-size:11px; font-weight:600; color:var(--text-3); cursor:pointer; border-radius:5px; }
.insp-tab:hover { color:var(--text-2); }
.insp-tab.active { color:var(--text); }

.insp-section { padding:12px 16px; border-bottom:1px solid var(--divider); }
.insp-title { font-size:11px; font-weight:600; color:var(--text); margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; }
.insp-title .add { color:var(--text-3); cursor:pointer; }
.insp-title .add:hover { color:var(--text); }

.align-row { display:flex; align-items:center; justify-content:space-between; padding:6px 14px; border-bottom:1px solid var(--divider); }
.align-btn { width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center; color:var(--icon); cursor:pointer; }
.align-btn:hover { background:var(--hover); color:#fff; }

.field-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.field {
  display:flex; align-items:center; gap:6px; height:28px; padding:0 8px;
  background:var(--input); border:1px solid transparent; border-radius:5px; cursor:default;
}
.field:hover { border-color:var(--border); background:var(--input-hover); }
.field .f-key { color:var(--text-3); font-size:11px; width:12px; flex-shrink:0; }
.field .f-val { color:var(--text); font-size:11px; flex:1; }

.color-row { display:flex; align-items:center; gap:8px; height:28px; padding:0 8px; background:var(--input); border:1px solid transparent; border-radius:5px; }
.color-row:hover { border-color:var(--border); }
.swatch { width:16px; height:16px; border-radius:4px; border:1px solid rgba(255,255,255,0.12); flex-shrink:0; }
.color-hex { flex:1; color:var(--text); font-size:11px; text-transform:uppercase; }
.color-op { color:var(--text-2); font-size:11px; }
.color-eye { color:var(--text-3); cursor:pointer; }
.color-eye:hover { color:var(--text); }
.stack { display:flex; flex-direction:column; gap:6px; }

.export-btn {
  width:100%; height:28px; background:var(--input); border:1px solid var(--border);
  color:var(--text-2); border-radius:6px; font-family:var(--sans); font-size:11px; font-weight:600;
  cursor:pointer; margin-top:2px;
}
.export-btn:hover { background:var(--input-hover); color:var(--text); }
.export-btn.primary { background:var(--blue); border-color:var(--blue); color:#fff; }
.export-btn.primary:hover { background:var(--blue-hover); }

/* ───────────── Floating zoom pill ───────────── */
.zoombar {
  position:fixed; bottom:16px; right:256px; height:32px; z-index:90;
  background:var(--chrome); border:1px solid var(--border); border-radius:8px;
  display:flex; align-items:center; padding:0 2px; box-shadow:0 4px 14px rgba(0,0,0,0.35);
}
.zoombar button { width:28px; height:28px; border:none; background:none; color:var(--icon); cursor:pointer; border-radius:5px; font-size:15px; display:flex; align-items:center; justify-content:center; }
.zoombar button:hover { background:var(--hover); color:#fff; }
.zoom-val { min-width:46px; text-align:center; font-size:11px; color:var(--text-2); cursor:pointer; padding:0 4px; }
.zoom-val:hover { color:#fff; }

.minimap {
  position:fixed; bottom:60px; right:256px; width:150px; height:96px; z-index:90;
  background:#1a1a1a; border:1px solid var(--border); border-radius:8px; overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.35);
}
.minimap-frame { position:absolute; border-radius:1px; pointer-events:none; }
.minimap-viewport { position:absolute; border:1px solid var(--blue); background:rgba(13,153,255,0.10); pointer-events:none; }

.kbd-hint { position:fixed; bottom:18px; left:256px; font-size:11px; color:var(--text-3); z-index:90; display:flex; gap:14px; align-items:center; }
.kbd { background:var(--chrome); border:1px solid var(--border); padding:2px 6px; border-radius:4px; color:var(--text-2); font-size:10px; }

/* ───────────── Present mode ───────────── */
.present { position:fixed; inset:0; z-index:1000; background:#171717; display:none; flex-direction:column; }
.present.on { display:flex; }
.present-top {
  height:48px; flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; background:var(--chrome); border-bottom:1px solid var(--border); color:var(--text);
}
.present-top .pt-name { font-size:13px; font-weight:600; }
.present-top .pt-sub { font-size:11px; color:var(--text-3); margin-left:8px; }
.present-top .pt-right { display:flex; align-items:center; gap:6px; }
.present-count { font-family:var(--mono); font-size:11px; color:var(--text-2); padding:0 8px; }
.present-btn { width:30px; height:30px; border:none; background:none; color:var(--icon); cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center; }
.present-btn:hover { background:var(--hover); color:#fff; }
.present-stage { flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.present-frame { box-shadow:0 30px 80px rgba(0,0,0,0.6); border-radius:6px; overflow:hidden; transform-origin:center; }
.present-zone { position:absolute; top:0; bottom:0; width:33%; cursor:pointer; z-index:2; display:flex; align-items:center; opacity:0; transition:opacity .15s; }
.present-zone:hover { opacity:1; }
.present-zone.prev { left:0; justify-content:flex-start; padding-left:24px; }
.present-zone.next { right:0; justify-content:flex-end; padding-right:24px; }
.present-zone svg { color:#fff; filter:drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
.present-dots { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); display:flex; gap:7px; z-index:3; }
.present-dot { width:7px; height:7px; border-radius:50%; background:#444; cursor:pointer; transition:background .15s; }
.present-dot.active { background:var(--blue); }

/* ───────────── Detail page (Figma-style reader) ───────────── */
.detail { position:fixed; inset:0; z-index:1000; background:var(--canvas); display:none; flex-direction:column; }
.detail.on { display:flex; }
.detail-grid {
  position:absolute; inset:0; pointer-events:none;
  background-image:radial-gradient(circle, #2b2b2b 1.2px, transparent 1.2px);
  background-size:24px 24px; opacity:.5;
}
.detail-top {
  height:48px; flex-shrink:0; z-index:2; display:flex; align-items:center; justify-content:space-between;
  padding:0 12px; background:var(--chrome); border-bottom:1px solid var(--border); color:var(--text);
}
.detail-back { display:flex; align-items:center; gap:6px; height:30px; padding:0 10px; border:none; background:none; color:var(--text-2); cursor:pointer; border-radius:6px; font-family:var(--sans); font-size:12px; font-weight:600; }
.detail-back:hover { background:var(--hover); color:#fff; }
.detail-crumb { font-size:12px; color:var(--text-3); }
.detail-crumb b { color:var(--text); font-weight:600; }
.detail-close { width:30px; height:30px; border:none; background:none; color:var(--icon); cursor:pointer; border-radius:6px; display:flex; align-items:center; justify-content:center; }
.detail-close:hover { background:var(--hover); color:#fff; }
.detail-scroll { flex:1; overflow-y:auto; z-index:1; scrollbar-width:thin; }
.detail-scroll::-webkit-scrollbar { width:10px; }
.detail-scroll::-webkit-scrollbar-thumb { background:#444; border-radius:5px; border:3px solid var(--canvas); }
.detail-doc { max-width:760px; margin:48px auto 100px; border-radius:10px; overflow:hidden; box-shadow:0 30px 90px rgba(0,0,0,0.55); border:1px solid var(--divider); position:relative; }
.dd-frame-label { font-family:var(--mono); font-size:11px; color:var(--text-3); margin:0 auto 8px; max-width:760px; padding-left:2px; }
.dd-hero { padding:56px 56px 44px; position:relative; overflow:hidden; }
.dd-hero-glow { position:absolute; inset:0; pointer-events:none; }
.dd-tag { font-family:var(--mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:14px; position:relative; }
.dd-title { font-family:var(--mono); font-weight:700; font-size:52px; line-height:1.05; position:relative; }
.dd-intro { font-family:var(--sans); font-size:16px; line-height:1.7; color:#cfcfcf; margin-top:20px; max-width:60ch; position:relative; }
.dd-meta { display:flex; flex-wrap:wrap; gap:10px; padding:20px 56px; border-top:1px solid rgba(255,255,255,0.06); border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.18); }
.dd-meta-item { display:flex; flex-direction:column; gap:3px; }
.dd-meta-k { font-family:var(--mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-3); }
.dd-meta-v { font-family:var(--sans); font-size:12px; font-weight:600; color:#e6e6e6; }
.dd-body { padding:44px 56px 52px; background:rgba(0,0,0,0.22); }
.dd-section { margin-bottom:32px; }
.dd-h { font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:10px; }
.dd-p { font-family:var(--sans); font-size:14.5px; line-height:1.85; color:#a8a8a8; max-width:64ch; }
.dd-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.dd-pill { font-family:var(--mono); font-size:10px; padding:3px 9px; border-radius:4px; border:1px solid; }
</style>
</head>
<body>

<!-- ───────── TOP TOOLBAR ───────── -->
<div class="toolbar">
  <div class="tb-group tb-left">
    <div class="tb-logo" title="Hoofdmenu">
      <svg width="16" height="24" viewBox="0 0 38 57" fill="none">
        <path d="M19 28.5a9.5 9.5 0 119.5 9.5H19V28.5z" fill="#1ABCFE"/>
        <path d="M9.5 47.5A9.5 9.5 0 0119 38v9.5a9.5 9.5 0 11-9.5 0z" fill="#0ACF83"/>
        <path d="M19 0v19h9.5a9.5 9.5 0 100-19H19z" fill="#FF7262"/>
        <path d="M0 9.5A9.5 9.5 0 009.5 19H19V0H9.5A9.5 9.5 0 000 9.5z" fill="#F24E1E"/>
        <path d="M0 28.5A9.5 9.5 0 009.5 38H19V19H9.5A9.5 9.5 0 000 28.5z" fill="#A259FF"/>
      </svg>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn active" id="toolMove" title="Verplaatsen (V)" onclick="setTool('move')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 7-6.5 1.8L9.5 18 5 3z"/></svg>
      <svg class="tb-caret" width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><path d="M1 2.5L4 5.5 7 2.5"/></svg>
    </button>
    <button class="tb-btn" id="toolScale" title="Schalen (K)" onclick="setTool('scale')">

function frameInnerHTML(f) {
  if (f.type === 'cover') {
    return `<div class="fc-cover">
      <div class="fc-cover-glow" style="background:radial-gradient(ellipse at 20% 80%,${f.accentColor}33 0%,transparent 65%)"></div>

      <div class="fc-cover-title" style="font-size:${f.w>400?44:24}px;color:${f.accentColor}">${f.title.replace(/\n/g,'<br>')}</div>
      <div class="fc-cover-sub">${f.sub.replace(/\n/g,'<br>')}</div>
      <div class="fc-cover-meta">${f.meta}</div></div>`;
  }
  if (f.type === 'post') {
    return `<div class="fc-post">
      <div class="fc-post-tag" style="color:${f.accentColor}">${f.tag}</div>
      <div class="fc-post-title">${f.title.replace(/\n/g,'<br>')}</div>
      <div class="fc-post-body">${f.body.replace(/\n/g,'<br><br>')}</div>
      <div class="fc-post-footer">
        <div class="fc-post-date">${f.date}</div>
        <div class="fc-post-tags">${(f.pills||[]).map(p=>`<span class="fc-pill" style="color:${p.c};border-color:${p.c}44;background:${p.b}">${p.l}</span>`).join('')}</div>
      </div></div>`;
  }
  if (f.type === 'goals') {
    return `<div class="fc-goals">
      <div class="fc-post-tag" style="color:${f.accentColor}">${f.tag}</div>
      <div class="fc-goals-title" style="color:${f.accentColor}">${f.title}</div>
      <div class="goal-list">${f.goals.map(g=>`
        <div class="goal" style="border-left-color:${f.accentColor}">
          <div class="goal-top"><span class="goal-name">${g.t}</span><span class="goal-status" style="color:${g.sc};background:${g.sc}1f">${g.s}</span></div>
          <div class="goal-text">${g.d}</div>

  }
  return `<div class="fc-wip"><div class="fc-wip-icon">⬚</div><div class="fc-wip-text">${f.wipLabel}</div></div>`;
}

/* ───────── Build canvas ───────── */
function buildCanvas() {
  canvasEl.innerHTML = '';
  canvasEl.style.width = TOTAL_W + 'px';
  canvasEl.style.height = TOTAL_H + 'px';

  const sections = {};
  frames.forEach(f => {
    if (!sections[f.section]) sections[f.section] = {x:f.x, y:f.y};
    else { sections[f.section].x = Math.min(sections[f.section].x, f.x); sections[f.section].y = Math.min(sections[f.section].y, f.y); }
  });
  Object.entries(sections).forEach(([name, pos]) => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.style.cssText = `left:${pos.x}px;top:${pos.y - 36}px`;
    lbl.textContent = '// ' + name.toLowerCase();
    canvasEl.appendChild(lbl);
  });

  frames.forEach(f => {
    const el = document.createElement('div');
    el.className = 'frame'; el.id = 'frame-' + f.id;
    el.style.cssText = `left:${f.x}px;top:${f.y}px;width:${f.w}px;height:${f.h}px`;
    const lbl = document.createElement('div');
    lbl.className = 'frame-label'; lbl.textContent = f.label;
    el.appendChild(lbl);
    const inner = document.createElement('div');
    inner.className = 'frame-inner';
    inner.style.background = f.bgColor;
    if (f.type === 'wip') inner.style.border = `1px dashed ${f.accentColor}44`;
    inner.innerHTML = frameInnerHTML(f);
    el.appendChild(inner);
    el.addEventListener('click', e => { e.stopPropagation(); selectFrame(f.id); });
    el.addEventListener('dblclick', e => {
      e.stopPropagation();
      if (f.detail) openDetail(f);
      else if (f.link) window.open(f.link, '_blank');
    });
    canvasEl.appendChild(el);
  });

  buildLayers();
  buildMinimap();
}

function buildLayers() {
  const list = document.getElementById('layersList');
  list.innerHTML = '';
  [...frames].reverse().forEach(f => {
    const item = document.createElement('div');
    item.className = 'layer-row'; item.id = 'layer-' + f.id;
    item.innerHTML = `${ICON_FRAME}<span class="l-name">${f.label}</span>
      <svg class="l-eye" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="2.5"/></svg>`;
    item.addEventListener('click', () => { selectFrame(f.id); flyToFrame(f.id); });
    list.appendChild(item);
  });
}

function buildPagesList() {
  const list = document.getElementById('pagesList');
  list.innerHTML = '';
  Object.entries(PAGES).forEach(([key, pg]) => {
    const row = document.createElement('div');
    row.className = 'page-row' + (key===currentPage ? ' active' : '');
    row.innerHTML = `<svg class="page-check" width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 6.5L5 9.5 10 3"/></svg>${pg.name}`;
    row.addEventListener('click', () => switchPage(key));
    list.appendChild(row);
  });
}

function switchPage(key) {
  if (!PAGES[key]) return;
  currentPage = key;
  frames = PAGES[key].frames;
  TOTAL_W = PAGES[key].w; TOTAL_H = PAGES[key].h;
  selectedId = null;
  document.getElementById('fileName').textContent = 'Mitchell Scholte — ' + PAGES[key].name;
  buildPagesList();
  buildCanvas();
  showPageProps();
  fitAll();
}

function buildMinimap() {
  const mm = document.getElementById('minimapFrames');
  mm.innerHTML = '';
  const mmW = 150, mmH = 96;
  const sx = mmW / TOTAL_W, sy = mmH / TOTAL_H;
  frames.forEach(f => {
    const el = document.createElement('div');
    el.className = 'minimap-frame';
    el.style.cssText = `left:${f.x*sx}px;top:${f.y*sy}px;width:${f.w*sx}px;height:${f.h*sy}px;background:${f.accentColor}33;border:0.5px solid ${f.accentColor}66`;
    mm.appendChild(el);
  });
}

function selectFrame(id) {
  selectedId = id;
  document.querySelectorAll('.frame').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.layer-row').forEach(el => el.classList.remove('selected'));
  if (id) {
    document.getElementById('frame-'+id)?.classList.add('selected');
    document.getElementById('layer-'+id)?.classList.add('selected');
    showProps(frames.find(fr => fr.id === id));
  } else {
    showPageProps();
  }
}

/* ───────── Camera ───────── */
function flyToFrame(id) {
  const f = frames.find(fr => fr.id === id);
  if (!f) return;
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const tz = Math.min(ww/(f.w+120), wh/(f.h+120), 1.4);
  animateTo(ww/2-(f.x+f.w/2)*tz, wh/2-(f.y+f.h/2)*tz, tz);
}
function animateTo(tx,ty,tz) {
  const sx=camX, sy=camY, sz=zoom, dur=380, start=performance.now();
  function step(now) {
    const t=Math.min((now-start)/dur,1), e=t<0.5?2*t*t:-1+(4-2*t)*t;
    camX=sx+(tx-sx)*e; camY=sy+(ty-sy)*e; zoom=sz+(tz-sz)*e;
    applyTransform(); if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function applyTransform() {
  canvasEl.style.transform = `translate(${camX}px,${camY}px) scale(${zoom})`;
  document.getElementById('zoomDisplay').textContent = Math.round(zoom*100)+'%';
  const sz = 24*zoom;
  const dg = document.getElementById('dot-grid');
  dg.style.backgroundSize = `${sz}px ${sz}px`;
  dg.style.backgroundPosition = `${camX%sz}px ${camY%sz}px`;
  updateMinimap();
}
function updateMinimap() {
  const vp = document.getElementById('minimapViewport');
  const mmW=150, mmH=96, sx=mmW/TOTAL_W, sy=mmH/TOTAL_H;
  const vw=wrap.clientWidth/zoom, vh=wrap.clientHeight/zoom;
  const ox=-camX/zoom, oy=-camY/zoom;
  vp.style.left=Math.max(0,Math.min(mmW-2,ox*sx))+'px';
  vp.style.top=Math.max(0,Math.min(mmH-2,oy*sy))+'px';
  vp.style.width=Math.min(mmW,vw*sx)+'px';
  vp.style.height=Math.min(mmH,vh*sy)+'px';
}
function fitAll() {
  const ww=wrap.clientWidth, wh=wrap.clientHeight, pad=60;
  const tz=Math.min((ww-pad*2)/TOTAL_W,(wh-pad*2)/TOTAL_H);
  animateTo(ww/2-(TOTAL_W/2)*tz, wh/2-(TOTAL_H/2)*tz, tz);
}
function resetZoom() { animateTo(wrap.clientWidth/2-TOTAL_W/2, wrap.clientHeight/2-TOTAL_H/2, 1); }
function zoomBy(f) {
  const ww=wrap.clientWidth/2, wh=wrap.clientHeight/2;
  const nz=Math.max(0.1,Math.min(4,zoom*f));
  camX=ww-(ww-camX)*(nz/zoom); camY=wh-(wh-camY)*(nz/zoom); zoom=nz;
  applyTransform();
}
function setTool(t) {
  tool=t;
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool'+t.charAt(0).toUpperCase()+t.slice(1))?.classList.add('active');
}

/* ───────── Present mode ───────── */
let presenting = false, presentIndex = 0;
function startPresent() {
  presenting = true; presentIndex = 0;
  if (selectedId) { const i = frames.findIndex(f=>f.id===selectedId); if(i>=0) presentIndex=i; }
  document.getElementById('present').classList.add('on');
  document.getElementById('presentPage').textContent = '  ·  ' + PAGES[currentPage].name;
  buildPresentDots();
  renderPresent();
}
function stopPresent() { presenting = false; document.getElementById('present').classList.remove('on'); }
function presentStep(d) {
  presentIndex = (presentIndex + d + frames.length) % frames.length;
  renderPresent();
}
function buildPresentDots() {
  const dots = document.getElementById('presentDots');
  dots.innerHTML = '';
  frames.forEach((f,i) => {
    const dot = document.createElement('div');
    dot.className = 'present-dot' + (i===presentIndex ? ' active' : '');
    dot.addEventListener('click', () => { presentIndex=i; renderPresent(); });
    dots.appendChild(dot);
  });
}
function renderPresent() {
  const f = frames[presentIndex];
  const stage = document.getElementById('presentStage');
  const fr = document.getElementById('presentFrame');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const scale = Math.min((sw*0.86)/f.w, (sh*0.86)/f.h);
  fr.style.width = f.w+'px'; fr.style.height = f.h+'px';
  fr.style.background = f.bgColor;
  fr.style.transform = `scale(${scale})`;
  fr.style.border = f.type==='wip' ? `1px dashed ${f.accentColor}44` : 'none';
  fr.innerHTML = frameInnerHTML(f);
  document.getElementById('presentName').textContent = f.label;
  document.getElementById('presentCount').textContent = (presentIndex+1)+' / '+frames.length;
  document.querySelectorAll('.present-dot').forEach((d,i)=>d.classList.toggle('active', i===presentIndex));
}

/* ───────── Detail page ───────── */
let detailOpen = false;
function openDetail(f) {
  if (!f || !f.detail) return;
  detailOpen = true;
  const d = f.detail, acc = f.accentColor;
  document.getElementById('detailCrumb').innerHTML = `${PAGES[currentPage].name} / <b>${f.label.replace(/ —.*$/,'')}</b>`;
  document.getElementById('detailLabel').textContent = f.label;
  const doc = document.getElementById('detailDoc');
  doc.style.background = f.bgColor;
  doc.innerHTML = `
    <div class="dd-hero">
      <div class="dd-hero-glow" style="background:radial-gradient(ellipse at 15% 0%,${acc}2e 0%,transparent 60%)"></div>
      <div class="dd-tag" style="color:${acc}">${f.tag}</div>
      <div class="dd-title" style="color:${acc}">${f.title.replace(/\n/g,' ')}</div>
      <div class="dd-intro">${d.intro}</div>
    </div>
    ${(d.meta&&d.meta.length) ? `<div class="dd-meta">${d.meta.map(m=>`<div class="dd-meta-item"><span class="dd-meta-k">${m.k}</span><span class="dd-meta-v">${m.v}</span></div>`).join('')}</div>` : ''}
    <div class="dd-body">
      ${d.sections.map(s=>`<div class="dd-section"><div class="dd-h" style="color:${acc}">${s.h}</div><div class="dd-p">${s.p.replace(/\n/g,'<br><br>')}</div></div>`).join('')}
      <div class="dd-tags">${(f.pills||[]).map(p=>`<span class="dd-pill" style="color:${p.c};border-color:${p.c}55;background:${p.b}">${p.l}</span>`).join('')}</div>
    </div>`;
  document.getElementById('detailScroll').scrollTop = 0;
  document.getElementById('detail').classList.add('on');
}
function closeDetail() { detailOpen = false; document.getElementById('detail').classList.remove('on'); }

/* ───────── Input ───────── */
wrap.addEventListener('mousedown', e => {
  if (e.button!==0) return;
  const onCanvas = e.target===canvasEl||e.target.id==='dot-grid'||e.target.classList.contains('section-label');
  if (onCanvas || tool==='hand') {
    isPanning=true; wrap.classList.add('panning');
    panStart={x:e.clientX,y:e.clientY}; camStart={x:camX,y:camY};
    if(onCanvas) selectFrame(null);
  }
});
window.addEventListener('mouseup',()=>{ isPanning=false; wrap.classList.remove('panning'); });
window.addEventListener('mousemove', e => {
  if(isPanning){ camX=camStart.x+e.clientX-panStart.x; camY=camStart.y+e.clientY-panStart.y; applyTransform(); }
});
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r=wrap.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const f=e.deltaY<0?1.09:0.92, nz=Math.max(0.1,Math.min(4,zoom*f));
  camX=mx-(mx-camX)*(nz/zoom); camY=my-(my-camY)*(nz/zoom); zoom=nz;
  applyTransform();
},{passive:false});

window.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT') return;
  if(detailOpen) { if(e.key==='Escape') closeDetail(); return; }
  if(presenting) {
    if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter') { e.preventDefault(); presentStep(1); }
    if(e.key==='ArrowLeft') presentStep(-1);
    if(e.key==='Escape') stopPresent();
    return;
  }
  if(e.altKey && (e.key==='p'||e.key==='P')) { startPresent(); return; }
  if(e.shiftKey && e.key==='1') { fitAll(); return; }
  if(e.key==='1') resetZoom();
  if(e.key==='f'||e.key==='F') setTool('frame');
  if(e.key==='h'||e.key==='H') setTool('hand');
  if(e.key==='v'||e.key==='V') setTool('move');
  if(e.key==='t'||e.key==='T') setTool('text');
  if(e.key==='r'||e.key==='R') setTool('shape');
  if(e.key==='p'||e.key==='P') setTool('pen');
  if(e.key==='c'||e.key==='C') setTool('comment');
  if(e.key==='Escape') selectFrame(null);
});

window.addEventListener('resize', () => { applyTransform(); if(presenting) renderPresent(); });

buildPagesList();
buildCanvas();
showPageProps();
setTimeout(fitAll, 80);
</script>
</body>
</html>
